# Copy this file to .github/workflows/daily-post.yml in your repo root,
# then add the required secrets under Settings → Secrets and variables → Actions.
#
# Semi-manual mode: workflow generates the post and saves it as an "artifact"
# you can download from the GitHub Actions run page. Upload to Instagram manually.
name: Daily News Post (semi-manual)

on:
  schedule:
    # All times in WIB (UTC+7), translated to UTC for cron.
    - cron: "0 0 * * *"   # 07:00 WIB — morning commute
    - cron: "0 5 * * *"   # 12:00 WIB — lunch break
    - cron: "0 11 * * *"  # 18:00 WIB — after-work evening
    - cron: "0 14 * * *"  # 21:00 WIB — primetime
  workflow_dispatch:  # also allow manual trigger from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: daily-news-poster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: daily-news-poster/requirements.txt

      - run: pip install -r requirements.txt

      - run: python daily_post.py
        env:
          DRY_RUN: "true"
          NEWS_SOURCE: auto
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWS_COUNTRY_INTL: us
          NEWS_CATEGORY: general
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          IMAGE_LICENSE_FILTER: any

      - name: Update site manifest
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path("daily-news-poster/out")
          posts = []
          if out.exists():
              for d in sorted(out.iterdir(), reverse=True):
                  if not d.is_dir(): continue
                  if not (d / "post_1.jpg").exists(): continue
                  if not (d / "caption.txt").exists(): continue
                  meta_p = d / "meta.json"
                  if meta_p.exists():
                      try:
                          meta = json.loads(meta_p.read_text(encoding="utf-8"))
                          meta.setdefault("id", d.name)
                          posts.append(meta)
                          continue
                      except Exception:
                          pass
                  posts.append({"id": d.name, "date": d.name, "time": "", "headline": ""})
          Path("docs").mkdir(exist_ok=True)
          Path("docs/manifest.json").write_text(
              json.dumps({"posts": posts}, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Commit generated post to repo
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-news-poster/out/ docs/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily post for $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload generated post as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-${{ github.run_id }}
          path: daily-news-poster/out/
          retention-days: 14
