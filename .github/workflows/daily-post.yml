# Copy this file to .github/workflows/daily-post.yml in your repo root,
# then add the required secrets under Settings → Secrets and variables → Actions.
#
# Semi-manual mode: workflow generates the post and saves it as an "artifact"
# you can download from the GitHub Actions run page. Upload to Instagram manually.
name: Daily News Post (semi-manual)

on:
  schedule:
    # 00:00 UTC = 07:00 WIB (Jakarta). Adjust as needed.
    - cron: "0 0 * * *"
  workflow_dispatch:  # also allow manual trigger from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: daily-news-poster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: daily-news-poster/requirements.txt

      - run: pip install -r requirements.txt

      - run: python daily_post.py
        env:
          DRY_RUN: "true"
          NEWS_SOURCE: auto
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWS_COUNTRY_INTL: us
          NEWS_CATEGORY: general
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          IMAGE_LICENSE_FILTER: any

      - name: Commit generated post to repo
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-news-poster/out/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily post for $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload generated post as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-${{ github.run_id }}
          path: daily-news-poster/out/
          retention-days: 14
