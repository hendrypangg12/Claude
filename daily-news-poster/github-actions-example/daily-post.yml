# Copy this file to .github/workflows/daily-post.yml in your repo,
# then add all secrets under Settings → Secrets and variables → Actions.
name: Daily Instagram Post

on:
  schedule:
    # 00:00 UTC = 07:00 WIB (Jakarta). Adjust as needed.
    - cron: "0 0 * * *"
  workflow_dispatch:  # also allow manual trigger from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-news-poster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: daily-news-poster/requirements.txt

      - run: pip install -r requirements.txt

      - run: python daily_post.py
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWS_COUNTRY: id
          NEWS_CATEGORY: general
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          IMAGE_LICENSE_FILTER: cc_publicdomain,cc_attribute,cc_sharealike
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Upload generated post as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-${{ github.run_id }}
          path: daily-news-poster/out/
          retention-days: 14
