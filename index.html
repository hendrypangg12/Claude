<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nokia Snake</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1b1b1b;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #e8e8e8;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
  }
  /* Nokia 3310-ish phone body */
  #phone {
    background: linear-gradient(160deg, #2e5a8a 0%, #1d3c5c 60%, #122940 100%);
    border-radius: 28px;
    padding: 24px 22px 28px 22px;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.6),
      inset 0 2px 0 rgba(255, 255, 255, 0.18),
      inset 0 -3px 0 rgba(0, 0, 0, 0.35);
    width: 340px;
    position: relative;
  }
  #brand {
    text-align: center;
    font-weight: 800;
    letter-spacing: 4px;
    font-size: 13px;
    color: #d4e3f7;
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    margin-bottom: 14px;
  }
  #screen-frame {
    background: #0d1018;
    border-radius: 10px;
    padding: 14px 12px;
    box-shadow:
      inset 0 4px 10px rgba(0, 0, 0, 0.8),
      inset 0 -1px 0 rgba(255, 255, 255, 0.05);
  }
  #hud {
    display: flex;
    justify-content: space-between;
    font-family: "Courier New", monospace;
    color: #1a2a10;
    background: #9bbc0f;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 2px 2px 0 0;
    border-bottom: 1px solid #6b8a0a;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #9bbc0f;
    border-radius: 0 0 2px 2px;
    touch-action: none;
  }
  #keypad {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    justify-items: center;
  }
  .key {
    width: 64px;
    height: 36px;
    background: linear-gradient(180deg, #2b4a70 0%, #15283e 100%);
    border: 1px solid #0a1624;
    border-radius: 10px;
    color: #d4e3f7;
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.18),
      0 2px 0 rgba(0, 0, 0, 0.35);
    transition: transform 0.05s ease;
  }
  .key:active {
    transform: translateY(2px);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }
  .key.wide { grid-column: span 3; width: 100%; }
  .row { display: contents; }
  .spacer { visibility: hidden; }
  .hint {
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
    max-width: 460px;
    line-height: 1.6;
  }
  kbd {
    background: #2a2a44;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    border-bottom: 2px solid #12122a;
    color: #fff;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="phone">
    <div id="brand">NOKIA</div>
    <div id="screen-frame">
      <div id="hud">
        <span id="score">SCORE 0</span>
        <span id="hi">HI 0</span>
      </div>
      <canvas id="game" width="240" height="200"></canvas>
    </div>
    <div id="keypad">
      <div class="spacer key"></div>
      <div class="key" data-dir="up">▲</div>
      <div class="spacer key"></div>
      <div class="key" data-dir="left">◀</div>
      <div class="key" data-action="pause">II</div>
      <div class="key" data-dir="right">▶</div>
      <div class="spacer key"></div>
      <div class="key" data-dir="down">▼</div>
      <div class="spacer key"></div>
    </div>
  </div>
  <div class="hint">
    <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> move &nbsp;·&nbsp;
    <kbd>P</kbd> pause &nbsp;·&nbsp;
    <kbd>R</kbd> / <kbd>Enter</kbd> restart
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const hiEl = document.getElementById("hi");

  // Grid configured so pixels stay crisp (240x200 canvas, 10px cells => 24x20 grid)
  const CELL = 10;
  const COLS = canvas.width / CELL;   // 24
  const ROWS = canvas.height / CELL;  // 20

  // Classic Game Boy / Nokia LCD palette
  const BG_LIGHT = "#9bbc0f";
  const BG_DIM   = "#8aac0f";
  const FG_DARK  = "#0f380f";
  const FG_MID   = "#306230";

  const DIRS = {
    up:    { x:  0, y: -1 },
    down:  { x:  0, y:  1 },
    left:  { x: -1, y:  0 },
    right: { x:  1, y:  0 },
  };

  const STORAGE_KEY = "nokia-snake-hi";

  const state = {
    snake: [],
    dir: DIRS.right,
    pendingDir: DIRS.right,
    food: null,
    score: 0,
    hi: Number(localStorage.getItem(STORAGE_KEY) || 0),
    status: "ready", // ready | playing | paused | over
    tickMs: 120,
    accum: 0,
    lastTime: 0,
    blink: 0,
  };

  function reset() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    state.snake = [
      { x: cx - 2, y: cy },
      { x: cx - 1, y: cy },
      { x: cx,     y: cy },
    ];
    state.dir = DIRS.right;
    state.pendingDir = DIRS.right;
    state.score = 0;
    state.tickMs = 120;
    state.accum = 0;
    state.status = "ready";
    placeFood();
    updateHUD();
  }

  function placeFood() {
    const occupied = new Set(state.snake.map(s => s.x + "," + s.y));
    const free = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (!occupied.has(x + "," + y)) free.push({ x, y });
      }
    }
    if (free.length === 0) { state.food = null; return; }
    state.food = free[Math.floor(Math.random() * free.length)];
  }

  function updateHUD() {
    scoreEl.textContent = "SCORE " + String(state.score).padStart(3, "0");
    hiEl.textContent    = "HI "    + String(state.hi).padStart(3, "0");
  }

  function setDir(name) {
    const d = DIRS[name];
    if (!d) return;
    // Ignore reverses
    if (d.x === -state.dir.x && d.y === -state.dir.y) return;
    state.pendingDir = d;
    if (state.status === "ready") state.status = "playing";
  }

  function tick() {
    if (state.status !== "playing") return;
    state.dir = state.pendingDir;
    const head = state.snake[state.snake.length - 1];
    const nh = { x: head.x + state.dir.x, y: head.y + state.dir.y };

    // Wall collision (classic Nokia = die on wall)
    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) {
      gameOver();
      return;
    }
    // Self collision (allow moving into the tail cell that will vacate this turn)
    const willGrow = state.food && nh.x === state.food.x && nh.y === state.food.y;
    const body = willGrow ? state.snake : state.snake.slice(1);
    for (const seg of body) {
      if (seg.x === nh.x && seg.y === nh.y) { gameOver(); return; }
    }

    state.snake.push(nh);
    if (willGrow) {
      state.score += 10;
      if (state.score > state.hi) {
        state.hi = state.score;
        localStorage.setItem(STORAGE_KEY, String(state.hi));
      }
      // Speed up gradually, floor at 55ms
      state.tickMs = Math.max(55, state.tickMs - 3);
      placeFood();
      updateHUD();
    } else {
      state.snake.shift();
    }
  }

  function gameOver() {
    state.status = "over";
  }

  function togglePause() {
    if (state.status === "playing") state.status = "paused";
    else if (state.status === "paused") state.status = "playing";
  }

  // ---------- Rendering ----------
  function drawPixel(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
  }

  function drawSnakeSegment(x, y) {
    // Outer dark square, inner gap for that retro LCD segmented look
    ctx.fillStyle = FG_DARK;
    ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
    ctx.fillStyle = BG_LIGHT;
    ctx.fillRect(x * CELL + 3, y * CELL + 3, CELL - 6, CELL - 6);
    ctx.fillStyle = FG_DARK;
    ctx.fillRect(x * CELL + 4, y * CELL + 4, CELL - 8, CELL - 8);
  }

  function drawFood() {
    if (!state.food) return;
    const { x, y } = state.food;
    // Diamond-ish pixel food
    const px = x * CELL;
    const py = y * CELL;
    ctx.fillStyle = FG_DARK;
    ctx.fillRect(px + 4, py + 1, 2, 8);
    ctx.fillRect(px + 1, py + 4, 8, 2);
    ctx.fillRect(px + 3, py + 2, 4, 6);
    ctx.fillRect(px + 2, py + 3, 6, 4);
  }

  function drawBackground() {
    ctx.fillStyle = BG_LIGHT;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Faint pixel dither to mimic LCD texture
    ctx.fillStyle = BG_DIM;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if ((x + y) % 2 === 0) {
          ctx.fillRect(x * CELL, y * CELL, 1, 1);
        }
      }
    }
    // Border frame inside the playfield
    ctx.strokeStyle = FG_DARK;
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
  }

  function drawCenteredText(lines, opts = {}) {
    const {
      boxPadding = 8,
      lineHeight = 14,
      font = "bold 12px 'Courier New', monospace",
    } = opts;
    ctx.font = font;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const widths = lines.map(l => ctx.measureText(l).width);
    const boxW = Math.min(canvas.width - 20, Math.max(...widths) + boxPadding * 2);
    const boxH = lines.length * lineHeight + boxPadding * 2;
    const bx = (canvas.width - boxW) / 2;
    const by = (canvas.height - boxH) / 2;

    ctx.fillStyle = BG_LIGHT;
    ctx.fillRect(bx, by, boxW, boxH);
    ctx.strokeStyle = FG_DARK;
    ctx.lineWidth = 2;
    ctx.strokeRect(bx + 1, by + 1, boxW - 2, boxH - 2);

    ctx.fillStyle = FG_DARK;
    lines.forEach((line, i) => {
      const y = by + boxPadding + lineHeight / 2 + i * lineHeight;
      ctx.fillText(line, canvas.width / 2, y);
    });
  }

  function render() {
    drawBackground();

    for (const seg of state.snake) drawSnakeSegment(seg.x, seg.y);
    drawFood();

    if (state.status === "ready") {
      drawCenteredText(["SNAKE", "", "PRESS ANY ARROW", "TO START"]);
    } else if (state.status === "paused") {
      if (Math.floor(state.blink / 400) % 2 === 0) {
        drawCenteredText(["PAUSED", "", "PRESS P"]);
      }
    } else if (state.status === "over") {
      drawCenteredText([
        "GAME OVER",
        "",
        "SCORE " + state.score,
        "HI    " + state.hi,
        "",
        "PRESS R",
      ]);
    }
  }

  function loop(t) {
    const dt = state.lastTime ? t - state.lastTime : 0;
    state.lastTime = t;
    state.blink += dt;

    if (state.status === "playing") {
      state.accum += dt;
      while (state.accum >= state.tickMs) {
        state.accum -= state.tickMs;
        tick();
      }
    }

    render();
    requestAnimationFrame(loop);
  }

  // ---------- Input ----------
  const KEY_TO_DIR = {
    ArrowUp: "up",    KeyW: "up",
    ArrowDown: "down",  KeyS: "down",
    ArrowLeft: "left",  KeyA: "left",
    ArrowRight: "right", KeyD: "right",
  };

  window.addEventListener("keydown", (e) => {
    if (KEY_TO_DIR[e.code]) {
      e.preventDefault();
      if (state.status === "over") return;
      setDir(KEY_TO_DIR[e.code]);
    } else if (e.code === "KeyP" || e.code === "Space") {
      e.preventDefault();
      togglePause();
    } else if (e.code === "KeyR" || e.code === "Enter") {
      e.preventDefault();
      reset();
    }
  });

  document.querySelectorAll(".key").forEach(el => {
    el.addEventListener("click", () => {
      const dir = el.dataset.dir;
      const action = el.dataset.action;
      if (dir) {
        if (state.status === "over") reset();
        setDir(dir);
      } else if (action === "pause") {
        if (state.status === "over") reset();
        else togglePause();
      }
    });
  });

  // Swipe on the canvas for mobile
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener("touchend", (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
    if (state.status === "over") { reset(); return; }
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? "right" : "left");
    else setDir(dy > 0 ? "down" : "up");
  });

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
